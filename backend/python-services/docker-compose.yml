version: '3.8'

services:
  # ─── Frontend (Nginx + React) ───────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: aistudio-frontend
    ports:
      - '3000:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/health']
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      go-backend:
        condition: service_healthy

  # ─── Go Backend ─────────────────────────────────────────────────────────────
  go-backend:
    build:
      context: ../go-backend
      dockerfile: Dockerfile
    container_name: aistudio-go-backend
    ports:
      - '8080:8080'
    environment:
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - GIN_MODE=release
      - PYTHON_VIDEO_URL=http://video-processor:8000
      - PYTHON_STT_URL=http://speech-to-text:8000
      - PYTHON_TTS_URL=http://text-to-speech:8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
        reservations:
          memory: 128M
    depends_on:
      redis:
        condition: service_healthy

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aistudio-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─── Video Processor ───────────────────────────────────────────────────────
  video-processor:
    build:
      context: ./video_processor
      dockerfile: Dockerfile
    container_name: aistudio-video-processor
    ports:
      - '8001:8000'
    volumes:
      - video-temp:/app/temp
    environment:
      - TEMP_DIR=/app/temp
      - MAX_WORKERS=4
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy

  # ─── Speech to Text ────────────────────────────────────────────────────────
  speech-to-text:
    build:
      context: ./speech_to_text
      dockerfile: Dockerfile
    container_name: aistudio-speech-to-text
    ports:
      - '8002:8000'
    volumes:
      - stt-temp:/app/temp
      - whisper-cache:/root/.cache
    environment:
      - MODEL_SIZE=base
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      - TEMP_DIR=/app/temp
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 1G
    depends_on:
      redis:
        condition: service_healthy

  # ─── Text to Speech ────────────────────────────────────────────────────────
  text-to-speech:
    build:
      context: ./text_to_speech
      dockerfile: Dockerfile
    container_name: aistudio-text-to-speech
    ports:
      - '8003:8000'
    volumes:
      - tts-temp:/app/temp
    environment:
      - TEMP_DIR=/app/temp
      - MAX_CONCURRENT=5
      - MAX_TEXT_LENGTH=50000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
        reservations:
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  video-temp:
  stt-temp:
  tts-temp:
  whisper-cache:

networks:
  default:
    name: aistudio-network
